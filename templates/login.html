<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login - Sistema de Ponto</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f5f6fa;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.card{
width:400px;
border-radius:15px;
}
</style>

</head>

<body>

<div class="card shadow p-4">
<h3 class="text-center mb-4">Sistema de Ponto</h3>

<form method="post">
{% csrf_token %}

<div class="mb-3">
<label>Usuário</label>
<input type="text" name="username" class="form-control">
</div>

<div class="mb-3">
<label>Senha</label>
<input type="password" name="password" class="form-control">
</div>

<button class="btn btn-primary w-100">
Entrar
</button>

</form>

</div>

</body>
</html>

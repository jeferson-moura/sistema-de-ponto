<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<h2>Login</h2>

<form method="post">
    {% csrf_token %}

    {% if form.errors %}
        <p style="color:red;">Usuário ou senha inválidos</p>
    {% endif %}

    <label>Usuário:</label>
    {{ form.username }}

    <br><br>

    <label>Senha:</label>
    {{ form.password }}

    <br><br>

    <button type="submit">Entrar</button>
</form>

</body>
</html>
